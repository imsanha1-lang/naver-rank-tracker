<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>네이버 지도 순위 추적</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<style>
  :root{
    --bg:#eef4ff; --card:#ffffff; --primary:#2563eb; --primary-d:#1d4ed8;
    --primary-soft:#e8f0ff; --text:#0f172a; --muted:#64748b; --border:#dbe4f3;
    --good:#16a34a; --warn:#d97706; --danger:#dc2626;
  }
  *{box-sizing:border-box;}
  body{margin:0; font-family:"Segoe UI","Malgun Gothic",sans-serif; background:var(--bg); color:var(--text); min-height:100vh;}
  button{font-family:inherit;}
  .hidden{display:none !important;}

  .team-group-box{background:#fff; border:2px solid var(--primary); border-radius:16px; padding:16px 18px 18px; box-shadow:0 6px 22px rgba(37,99,235,.1); text-align:left;}
  .team-group-label{text-align:left; font-size:15px; font-weight:800; color:var(--primary); margin:0 0 12px; padding-bottom:10px; border-bottom:1px solid var(--border);}

  header{background:#fff; border-bottom:1px solid var(--border); padding:16px 28px; display:flex; align-items:center; justify-content:space-between; position:sticky; top:0; z-index:20;}
  .brand{display:flex; align-items:center; gap:11px; cursor:pointer;}
  .logo{width:34px; height:34px; border-radius:9px; background:var(--primary); color:#fff; font-weight:800; display:grid; place-items:center;}
  .brand h1{font-size:17px; margin:0; color:var(--text);}
  .brand .sub{font-size:12px; color:var(--muted);}
  .updated{font-size:12px; color:var(--muted);}

  .btn{border:none; border-radius:10px; padding:11px 18px; font-size:14px; font-weight:600; cursor:pointer; background:var(--primary); color:#fff; transition:.15s;}
  .btn:hover{background:var(--primary-d);}
  .btn.sm{padding:7px 13px; font-size:12.5px;}

  .home{max-width:720px; margin:0 auto; padding:70px 20px 60px; text-align:center;}
  .home .big{font-size:30px; font-weight:800; margin:0 0 8px;}
  .home .big span{color:var(--primary);}
  .home .desc{color:var(--muted); margin:0 0 34px;}
  .searchbar{display:flex; gap:10px; background:#fff; border:2px solid var(--primary); border-radius:14px; padding:8px; box-shadow:0 8px 30px rgba(37,99,235,.10);}
  .searchbar input{flex:1; border:none; outline:none; font-size:16px; padding:12px 14px; background:transparent; color:var(--text);}
  .searchbar .btn{border-radius:9px;}

  .section-title{text-align:left; font-size:13px; color:var(--muted); font-weight:700; margin:38px 0 12px;}
  .chips{display:flex; flex-direction:column; gap:10px; width:100%;}
  .chip{background:var(--primary-soft); border:1px solid var(--border); border-radius:12px; padding:13px 16px; cursor:pointer; text-align:left; transition:.15s; width:100%;}
  .chip:hover{border-color:var(--primary); box-shadow:0 4px 14px rgba(37,99,235,.12);}
  .chip .nm{font-weight:700; font-size:15px;}
  .chip .kw{font-size:12px; color:var(--muted); margin-top:3px;}
  .chip .kw-heart{color:var(--primary); margin-right:5px; font-size:11px;}
  .empty{color:var(--muted); text-align:left; padding:18px 0;}

  .detail{max-width:940px; margin:0 auto; padding:26px 20px 70px;}
  .back{background:none; border:none; color:var(--primary); font-size:14px; font-weight:600; cursor:pointer; padding:6px 0; margin-bottom:8px;}
  .detail-head{display:flex; align-items:center; justify-content:space-between; gap:12px; flex-wrap:wrap; margin-bottom:20px;}
  .detail-head .pname{font-size:26px; font-weight:800;}
  .tabs{display:flex; gap:8px; flex-wrap:wrap; border-bottom:2px solid var(--border); margin-bottom:22px;}
  .tab{background:none; border:none; padding:12px 18px; font-size:14.5px; font-weight:700; color:var(--muted); cursor:pointer; border-bottom:3px solid transparent; margin-bottom:-2px;}
  .tab.active{color:var(--primary); border-bottom-color:var(--primary);}

  .panel{background:#fff; border:1px solid var(--border); border-radius:16px; padding:22px; margin-bottom:20px;}
  .toolbar{display:flex; align-items:center; gap:12px; flex-wrap:wrap; margin-bottom:4px;}
  .toolbar label{font-size:13px; color:var(--muted); font-weight:600;}
  select{border:1px solid var(--border); border-radius:10px; padding:10px 12px; font-size:14px; color:var(--text); background:#fff; min-width:180px;}
  select:focus{outline:none; border-color:var(--primary);}

  .rank-row{display:flex; align-items:center; gap:20px; flex-wrap:wrap; margin-top:18px;}
  .stat{background:var(--primary-soft); border-radius:14px; padding:16px 24px; min-width:150px; text-align:center;}
  .stat-label{font-size:13px; font-weight:700; color:var(--primary-d); margin-bottom:6px;}
  .rank-big{display:flex; align-items:baseline; gap:6px; justify-content:center;}
  .rank-num{font-size:52px; font-weight:800; line-height:1; color:var(--primary);}
  .rank-num.good{color:var(--good);} .rank-num.bad{color:var(--danger);} .rank-num.none{color:var(--muted); font-size:26px;}
  .rank-unit{font-size:17px; color:var(--muted);}
  .rank-meta{font-size:13.5px; color:var(--muted); line-height:1.9;}
  .rank-meta b{color:var(--text);}

  .toast{position:fixed; bottom:24px; left:50%; transform:translateX(-50%); background:var(--text); color:#fff; padding:12px 20px; border-radius:12px; font-size:14px; opacity:0; transition:.3s; pointer-events:none; z-index:80;}
  .toast.show{opacity:1;}
</style>
</head>
<body>
<header>
  <div class="brand" onclick="goHome()">
    <div class="logo">N</div>
    <div>
      <h1>네이버 지도 순위 추적</h1>
      <div class="sub">매일 낮 12시 자동 기록</div>
    </div>
  </div>
  <div class="updated" id="updated"></div>
</header>

<div class="home" id="homeView">
  <h2 class="big">우리 매장 <span>검색 순위</span>를 확인하세요</h2>
  <p class="desc">매장명을 검색하면 키워드별 순위와 추이를 볼 수 있어요.</p>
  <div class="searchbar">
    <input type="text" id="searchInput" placeholder="매장명을 입력하세요" list="placeList"
           onkeydown="if(event.key==='Enter')doSearch()" />
    <datalist id="placeList"></datalist>
    <button class="btn" onclick="doSearch()">검색</button>
  </div>
  <div class="section-title">등록된 매장</div>
  <div class="team-group-box">
    <div class="team-group-label">강태민 팀장 매장</div>
    <div class="chips" id="placeChips"></div>
    <div class="empty hidden" id="homeEmpty">아직 등록된 매장이 없습니다.</div>
  </div>
</div>

<div class="detail hidden" id="detailView">
  <button class="back" onclick="goHome()">← 매장 검색으로</button>
  <div class="detail-head">
    <div class="pname" id="detailName"></div>
  </div>
  <div class="tabs" id="tabs"></div>
  <div class="panel">
    <div class="toolbar">
      <label>날짜 선택</label>
      <select id="dateSelect" onchange="renderActive()"></select>
    </div>
    <div class="rank-row" id="rankRow"></div>
  </div>
  <div class="panel">
    <div class="section-title" style="margin:0 0 10px;">광고순위 추이 <span style="font-weight:500;color:var(--muted)">(광고 매장만)</span></div>
    <canvas id="chartAds" height="110"></canvas>
  </div>
  <div class="panel">
    <div class="section-title" style="margin:0 0 10px;">일반순위 추이</div>
    <canvas id="chartOrganic" height="110"></canvas>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
let PLACES = [];      // [{place_name, keywords:[...]}]
let RANKINGS = [];    // flat list
let current = null;
let activeTab = 0;
let chartAds = null, chartOrganic = null;

function toast(m){const t=document.getElementById('toast'); t.textContent=m; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),2600);}
function esc(s){return (s||'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}
function norm(s){return (s||'').replace(/\s+/g,'').toLowerCase();}
function dateOf(r){return r.date ? r.date : (r.datetime||r.checked_at||'').slice(0,10);}
function timeOf(r){const c=r.datetime||r.checked_at||''; return c.length>=16 ? c.slice(11,16) : '';}
function rankClass(r){ if(r==null) return 'none'; if(r<=3) return 'good'; if(r>10) return 'bad'; return ''; }

async function loadData(){
  try{
    const bust = '?t=' + Date.now();
    const [t, r] = await Promise.all([
      fetch('data/targets.json'+bust).then(x=>x.json()),
      fetch('data/rankings.json'+bust).then(x=>x.json()),
    ]);
    // targets 정규화 (묶음/단일쌍 모두 지원)
    const map = {};
    (t||[]).forEach(o=>{
      const p=(o.place_name||'').trim(); if(!p) return;
      let kws=o.keywords; if(!kws){ const s=(o.keyword||'').trim(); kws=s?[s]:[]; }
      map[p]=map[p]||{place_name:p, keywords:[]};
      kws.forEach(k=>{ if(k && !map[p].keywords.includes(k)) map[p].keywords.push(k); });
    });
    PLACES = Object.values(map);
    RANKINGS = r||[];
  }catch(e){ PLACES=[]; RANKINGS=[]; }
}

function lastUpdated(){
  let mx='';
  RANKINGS.forEach(r=>{ const d=r.datetime||r.date||''; if(d>mx) mx=d; });
  document.getElementById('updated').textContent = mx ? ('마지막 업데이트: '+mx) : '';
}

async function loadHome(){
  await loadData();
  lastUpdated();
  const chips=document.getElementById('placeChips');
  const dl=document.getElementById('placeList');
  const empty=document.getElementById('homeEmpty');
  chips.innerHTML=''; dl.innerHTML='';
  if(!PLACES.length){ empty.classList.remove('hidden'); return; }
  empty.classList.add('hidden');
  for(const p of PLACES){
    const div=document.createElement('div');
    div.className='chip'; div.onclick=()=>openPlace(p.place_name);
    div.innerHTML=`<div class="nm">${esc(p.place_name)}</div><div class="kw"><span class="kw-heart" aria-hidden="true">♥</span>${esc(p.keywords.join(', '))}</div>`;
    chips.appendChild(div);
    const o=document.createElement('option'); o.value=p.place_name; dl.appendChild(o);
  }
}

function doSearch(){
  const q=document.getElementById('searchInput').value.trim();
  if(!q){ toast('매장명을 입력하세요.'); return; }
  const exact=PLACES.find(p=>norm(p.place_name)===norm(q));
  const partial=PLACES.filter(p=>norm(p.place_name).includes(norm(q))||norm(q).includes(norm(p.place_name)));
  if(exact){ openPlace(exact.place_name); return; }
  if(partial.length===1){ openPlace(partial[0].place_name); return; }
  if(partial.length>1){ toast(`"${q}" 와 비슷한 매장 ${partial.length}개 — 아래 목록에서 선택하세요.`); return; }
  toast(`'${q}' 은(는) 등록되지 않은 매장입니다.`);
}

function goHome(){
  document.getElementById('detailView').classList.add('hidden');
  document.getElementById('homeView').classList.remove('hidden');
  loadHome();
}

function buildCurrent(name){
  const t=PLACES.find(p=>p.place_name===name);
  const keywords=(t?t.keywords:[]).map(kw=>({
    keyword:kw,
    rankings:RANKINGS.filter(r=>r.place_name===name && r.keyword===kw)
                     .slice().sort((a,b)=>(a.datetime||a.date||'').localeCompare(b.datetime||b.date||'')),
  }));
  return {place_name:name, keywords};
}

function openPlace(name){
  current=buildCurrent(name);
  activeTab=0;
  document.getElementById('homeView').classList.add('hidden');
  document.getElementById('detailView').classList.remove('hidden');
  document.getElementById('detailName').textContent=current.place_name;
  renderTabs(); renderDateOptions(); renderActive();
}

function renderTabs(){
  const box=document.getElementById('tabs'); box.innerHTML='';
  current.keywords.forEach((k,i)=>{
    const b=document.createElement('button');
    b.className='tab'+(i===activeTab?' active':''); b.textContent=k.keyword;
    b.onclick=()=>{ activeTab=i; renderTabs(); renderDateOptions(); renderActive(); };
    box.appendChild(b);
  });
}

function allDatesOfActive(){
  const kw=current.keywords[activeTab];
  const set=new Set((kw?kw.rankings:[]).map(dateOf).filter(Boolean));
  return [...set].sort().reverse();
}

function renderDateOptions(){
  const sel=document.getElementById('dateSelect'); const prev=sel.value;
  const dates=allDatesOfActive(); sel.innerHTML='';
  if(!dates.length){ const o=document.createElement('option'); o.value=''; o.textContent='수집된 날짜 없음'; sel.appendChild(o); return; }
  dates.forEach(d=>{ const o=document.createElement('option'); o.value=d; o.textContent=d; sel.appendChild(o); });
  sel.value=dates.includes(prev)?prev:dates[0];
}

function recordFor(kw,date){
  const rows=(kw?kw.rankings:[]).filter(r=>dateOf(r)===date);
  return rows.length?rows[rows.length-1]:null;
}

function renderActive(){
  const kw=current.keywords[activeTab];
  const date=document.getElementById('dateSelect').value;
  const rec=recordFor(kw,date);
  const row=document.getElementById('rankRow');
  if(!rec){
    row.innerHTML=`<div class="rank-meta">선택한 날짜에 수집된 기록이 없습니다.</div>`;
  }else{
    const ad=rec.rank_with_ads, org=rec.rank;
    const cell=(label,v,empty='미노출')=>`
      <div class="stat">
        <div class="stat-label">${label}</div>
        <div class="rank-big">
          ${v!=null?`<span class="rank-num ${rankClass(v)}">${v}</span><span class="rank-unit">위</span>`:`<span class="rank-num none">${empty}</span>`}
        </div>
      </div>`;
    row.innerHTML=`
      ${cell('광고순위',ad,org!=null?'해당없음':'미노출')}
      ${cell('일반순위',org,ad!=null?'해당없음':'미노출')}
      <div class="rank-meta">
        <b>${esc(kw.keyword)}</b><br>
        ${esc(date)} ${timeOf(rec)?('· '+timeOf(rec)):''}<br>
        페이지: ${rec.page!=null?rec.page+'페이지':'-'}
        ${rec.note?`<br><span style="color:var(--warn)">${esc(rec.note)}</span>`:''}
      </div>`;
  }
  drawChart(kw);
}

function _lineChart(id, prev, dates, data, label, color, soft){
  const ctx=document.getElementById(id).getContext('2d');
  if(prev) prev.destroy();
  return new Chart(ctx,{ type:'line',
    data:{ labels:dates, datasets:[{ label, data, borderColor:color, backgroundColor:soft,
      tension:.25, fill:true, spanGaps:true, pointRadius:4, pointBackgroundColor:color, pointHoverRadius:6 }]},
    options:{ scales:{
      y:{ reverse:true, ticks:{color:'#64748b',precision:0}, grid:{color:'#eef2fb'}, title:{display:true,text:'순위(낮을수록 좋음)',color:'#64748b'} },
      x:{ ticks:{color:'#64748b'}, grid:{color:'#f5f8ff'} } },
      plugins:{ legend:{ labels:{color:'#0f172a'} } } }
  });
}

function drawChart(kw){
  const rows=(kw?kw.rankings:[]).slice();
  const byDate={}; rows.forEach(r=>{ byDate[dateOf(r)]=r; });
  const dates=Object.keys(byDate).sort();
  chartAds=_lineChart('chartAds', chartAds, dates, dates.map(d=>byDate[d].rank_with_ads), '광고순위', '#f97316', 'rgba(249,115,22,.12)');
  chartOrganic=_lineChart('chartOrganic', chartOrganic, dates, dates.map(d=>byDate[d].rank), '일반순위', '#2563eb', 'rgba(37,99,235,.12)');
}

loadHome();
</script>
</body>
</html>
