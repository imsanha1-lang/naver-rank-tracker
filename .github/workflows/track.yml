name: 네이버 순위 수집

on:
  schedule:
    # UTC 03:00 = 한국시간(KST) 12:00. 매일 실행.
    - cron: "0 3 * * *"
  workflow_dispatch: {}   # GitHub 화면에서 수동 실행 버튼

permissions:
  contents: write

concurrency:
  group: rank-track
  cancel-in-progress: false

jobs:
  track:
    runs-on: ubuntu-latest
    steps:
      - name: 저장소 체크아웃
        uses: actions/checkout@v4

      - name: 파이썬 설치
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: 크롬 설치
        uses: browser-actions/setup-chrome@v1
        with:
          chrome-version: stable

      - name: 의존성 설치
        run: pip install -r requirements.txt

      - name: 순위 수집
        env:
          CI: "true"
          HEADLESS: "true"
        run: python track.py

      - name: 결과 커밋
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/data/rankings.json
          if git diff --staged --quiet; then
            echo "변경사항 없음"
          else
            git commit -m "chore: 순위 업데이트 $(date -u +%Y-%m-%d)"
            git push
          fi
